<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>假装思考ing — 只搜官方真实信息</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #080810;
    color: #d0d0e0;
    line-height: 1.8;
    min-height: 100vh;
  }
  .bg-decoration {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(circle at 50% 0%, rgba(233,69,96,0.08) 0%, transparent 50%);
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }
  /* Header */
  .header {
    padding: 48px 0 0;
    text-align: center;
  }
  .header-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .header h1 {
    font-size: 32px;
    background: linear-gradient(135deg, #e94560, #ff6b8a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .header p {
    color: #666;
    font-size: 15px;
    max-width: 480px;
    margin: 0 auto 40px;
  }
  /* Entry cards */
  .entries {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 48px;
  }
  @media (max-width: 600px) {
    .entries { grid-template-columns: 1fr; }
  }
  .entry-card {
    background: rgba(18,18,31,0.95);
    border: 1px solid #1e1e2e;
    border-radius: 16px;
    padding: 32px 28px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .entry-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #e94560, #ff6b8a);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .entry-card:hover {
    border-color: rgba(233,69,96,0.5);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    background: rgba(22,22,38,0.98);
  }
  .entry-card:hover::before { opacity: 1; }
  .entry-icon {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
  }
  .entry-title {
    font-size: 20px;
    color: #fff;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .entry-desc {
    font-size: 13px;
    color: #888;
    line-height: 1.7;
    margin-bottom: 16px;
  }
  .entry-meta {
    font-size: 12px;
    color: #555;
  }
  .entry-meta span {
    background: rgba(233,69,96,0.1);
    border: 1px solid rgba(233,69,96,0.2);
    color: #e94560;
    padding: 2px 10px;
    border-radius: 12px;
    margin-right: 8px;
  }
  .entry-card.active {
    border-color: rgba(233,69,96,0.4);
    background: rgba(20,20,35,0.98);
  }
  .entry-card.active::before { opacity: 1; }
  /* Coming soon section */
  .coming-soon {
    margin-bottom: 60px;
  }
  .section-title {
    font-size: 14px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    padding-left: 4px;
  }
  .coming-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 600px) {
    .coming-grid { grid-template-columns: 1fr 1fr; }
  }
  .coming-card {
    background: rgba(14,14,24,0.8);
    border: 1px dashed #2a2a3e;
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
    transition: all 0.3s;
  }
  .coming-card:hover {
    border-color: #3a3a5e;
    background: rgba(18,18,31,0.9);
  }
  .coming-icon {
    font-size: 28px;
    margin-bottom: 8px;
    display: block;
    opacity: 0.5;
  }
  .coming-name {
    font-size: 13px;
    color: #555;
  }
  /* Bottom info */
  .bottom-tip {
    text-align: center;
    padding: 40px 0 60px;
    border-top: 1px solid #1a1a2e;
  }
  .tip-box {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(233,69,96,0.06);
    border: 1px solid rgba(233,69,96,0.15);
    border-radius: 24px;
    padding: 10px 20px;
    font-size: 13px;
    color: #888;
  }
  .tip-box span { font-size: 16px; }
  /* Footer */
  footer {
    text-align: center;
    padding: 24px;
    border-top: 1px solid #111120;
    color: #444;
    font-size: 12px;
  }
  .footer-follow {
    margin-top: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    background: rgba(233,69,96,0.05);
    border: 1px solid rgba(233,69,96,0.12);
    border-radius: 12px;
    display: inline-flex;
  }
  .footer-follow img {
    width: 64px;
    height: 64px;
    border-radius: 8px;
  }
  .footer-follow-text {
    text-align: left;
  }
  .footer-follow-title {
    font-size: 14px;
    color: #d0d0e0;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .footer-follow-desc {
    font-size: 12px;
    color: #666;
  }
</style>
</head>
